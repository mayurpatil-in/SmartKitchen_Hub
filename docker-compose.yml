version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: smartkitchen_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartkitchen_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Flask Backend API Service
  backend:
    build: ./backend
    container_name: smartkitchen_backend
    restart: always
    depends_on:
      - db
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=super-secret-key-smartkitchen-hub-2026
      - JWT_SECRET_KEY=jwt-secret-key-smartkitchen-hub-2026
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/smartkitchen_db
      - PORT=5000
    ports:
      - "5000:5000"

  # Nginx React Frontend Service
  frontend:
    build: ./frontend
    container_name: smartkitchen_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
